version: "3.9"

services:
  backend:
    build: .
    container_name: backend
    volumes:
      - backend-data:/data
    networks:
      - devops-net

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - devops-net

networks:
  devops-net:

volumes:
  backend-data:
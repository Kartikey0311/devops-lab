name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t devops-lab .

    - name: Scan Docker Image with Trivy
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: 'devops-lab'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL'

    - name: Scan Repository Files
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: 'fs'
        format: 'table'

    - name: Install Bandit
      run: pip install bandit

    - name: Run SAST Scan
      run: bandit -r .